name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs tags for version derivation
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests
      - name: mypy strict on public API
        run: |
          mypy \
            src/cotsuite/__init__.py \
            src/cotsuite/inspect/ \
            src/cotsuite/autoraters/legibility_coverage.py \
            src/cotsuite/core/trajectory.py

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs tags for version derivation
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: pytest with coverage (xdist parallel)
        run: pytest --cov=cotsuite --cov-report=xml
      - name: upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs tags for version derivation
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: build sdist + wheel
        run: python -m build
      - name: verify version is PEP 440 compliant (no +local)
        run: |
          ls dist/
          python -c "
          import re, pathlib
          for f in pathlib.Path('dist').iterdir():
              # Trusted-publisher PyPI rejects local-version segments (+gsha)
              assert '+' not in f.name, f'local-version segment in {f.name}'
              print('OK:', f.name)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
