site_name: cot-suite
site_description: Chain-of-thought monitorability and faithfulness evaluation for reasoning-model agents.
site_url: https://thenerd31.github.io/cot-suite/
repo_url: https://github.com/thenerd31/cot-suite
repo_name: thenerd31/cot-suite
edit_uri: edit/main/docs/

# v0.1 docs site uses Material defaults — no custom theme work. Per
# Phase 3 spec, scope is the 9 sections enumerated in nav below.
# Internal-module API auto-generation is intentionally out of scope;
# only the public API surface (cotsuite.score_trajectory,
# cotsuite.cli, cotsuite.inspect.scorers.*) is documented.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Metrics:
      - Overview: metrics/index.md
      - Lanham (4-test suite): metrics/lanham.md
      - Turpin (counterfactual bias): metrics/turpin.md
      - Chen (cue injection): metrics/chen.md
      - Arcuschin (PHR detector): metrics/arcuschin.md
      - Emmons-Zimmermann (legibility/coverage): metrics/emmons-zimmermann.md
  - Inspect AI integration: inspect.md
  - Multi-family scaling: scaling.md
  - Reproducibility: reproducibility.md
  - Related work: related-work.md
  - Roadmap: roadmap.md
  - Citation: citation.md
  - Migration from cot-divergence: migration.md

# Existing docs/* files are repo source artifacts (not pages). Keep
# them in the repo but exclude from the rendered site so they don't
# show up as orphan pages or trigger "not in nav" warnings.
exclude_docs: |
  related_work.md
  inspect_ai_integration_assessment.md
  autorater-notes.md
  cross_judge_degeneracy.md
  paper-refs/

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
